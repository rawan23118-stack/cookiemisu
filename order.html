<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{text-align:center;font-size:38px;}
.subtitle{text-align:center;color:#7a5a45;margin-bottom:30px;}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.cart-box,.summary-box,.form{
background:white;
padding:22px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.item{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #eee;
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:76px;
height:76px;
border-radius:12px;
object-fit:cover;
}

.qty-box{
display:flex;
gap:10px;
align-items:center;
}

.qty-box button{
background:#5c3b2e;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:5px;
}

.price{font-weight:bold;}

.form input,.form textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.clear-btn,.checkout-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
border-radius:8px;
}

.clear-btn{background:#ddd;}
.checkout-btn{background:#5c3b2e;color:white;}

.empty{
text-align:center;
color:#999;
padding:30px 0;
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review before confirming</p>

<div class="wrapper">

<div>
<div class="cart-box" id="cart"></div>

<div class="form">
<h3>Customer Info</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="summary-box">
<h3>Order Summary</h3>
<div id="total"></div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png"
};

function getPrice(item){
if(item.name==="Strawberry Muffins") return 1.5;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Dubai Chocolate") return 15;
if(item.name==="Classic Tiramisu") return Number(item.size)||12;
return 0;
}

function render(){

let container=document.getElementById("cart");
container.innerHTML="";

if(cart.length===0){
container.innerHTML=`<div class="empty">Cart empty</div>`;
document.getElementById("total").innerText="";
return;
}

let total=0;

cart.forEach((item,i)=>{

let price=getPrice(item)*item.quantity;
total+=price;

container.innerHTML+=`
<div class="item">
<div class="left">
<img src="${images[item.name]}">
<div>
<h3>${item.name}</h3>
<p>Qty: ${item.quantity}</p>
${item.size ? `<p>Size: ${item.size}</p>` : ""}
</div>
</div>

<div>
<div class="qty-box">
<button onclick="change(${i},-1)">-</button>
<span>${item.quantity}</span>
<button onclick="change(${i},1)">+</button>
</div>
<div class="price">${price.toFixed(2)} JD</div>
</div>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total.toFixed(2)+" JD";

localStorage.setItem("cart", JSON.stringify(cart));
}

function change(i,c){
cart[i].quantity+=c;
if(cart[i].quantity<1) cart.splice(i,1);
render();
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();

</script>

</body>
</html>
