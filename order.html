<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:38px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:30px;
}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
align-items:start;
}

.cart-box,
.summary-box,
.form{
background:white;
padding:22px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid #eee;
}

.item:last-child{
border-bottom:none;
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:76px;
height:76px;
border-radius:12px;
object-fit:cover;
}

.info h3{
margin:0;
font-size:18px;
}

.info p{
margin:4px 0;
font-size:13px;
color:#7a5a45;
}

.qty-box{
display:flex;
gap:10px;
align-items:center;
justify-content:flex-end;
}

.qty-box button{
background:#5c3b2e;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:5px;
}

.price{
font-weight:bold;
text-align:right;
margin-top:8px;
}

.form{
margin-top:25px;
}

.form h3,
.summary-box h3{
margin-top:0;
}

.form input,
.form textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #d5c7bd;
font-family:'Playfair Display', serif;
background:#fffaf7;
}

.form textarea{
height:90px;
resize:none;
}

.summary-item{
background:#fffaf7;
border:1px solid #eaded5;
border-radius:12px;
padding:12px;
margin-bottom:12px;
}

.summary-item h4{
margin:0 0 5px;
font-size:16px;
}

.summary-item p{
margin:3px 0;
font-size:13px;
color:#7a5a45;
}

.summary-item .item-price{
font-weight:bold;
margin-top:8px;
color:#5a3a2e;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
border-top:1px solid #ddd;
padding-top:15px;
margin-top:15px;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.clear-btn,
.checkout-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:600;
}

.clear-btn{
background:#ddd;
color:#000;
}

.checkout-btn{
background:#5c3b2e;
color:white;
}

.checkout-btn:hover{
background:#000;
}

.empty{
text-align:center;
color:#999;
padding:30px 0;
}

@media(max-width:800px){
body{
padding:25px 5%;
}

.wrapper{
grid-template-columns:1fr;
}

.item{
align-items:flex-start;
gap:10px;
}

.left img{
width:65px;
height:65px;
}

h1{
font-size:32px;
}
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review before confirming</p>

<div class="wrapper">

<div>
<div class="cart-box" id="cart"></div>

<div class="form">
<h3>Customer Info</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="summary-box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png"
};

function getPrice(item){
if(item.name==="Strawberry Muffins") return 1.5;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Dubai Chocolate") return 15;
if(item.name==="Classic Tiramisu") return Number(item.size)||12;
return 0;
}

function render(){

let container=document.getElementById("cart");
let summaryItems=document.getElementById("summaryItems");

container.innerHTML="";
summaryItems.innerHTML="";

if(cart.length===0){
container.innerHTML=`<div class="empty">Cart empty</div>`;
summaryItems.innerHTML=`<div class="empty">No items selected</div>`;
document.getElementById("total").innerText="0 JD";
return;
}

let total=0;

cart.forEach((item,i)=>{

let price=getPrice(item)*item.quantity;
total+=price;

container.innerHTML+=`
<div class="item">
<div class="left">
<img src="${images[item.name] || 'img/1.png'}">
<div class="info">
<h3>${item.name}</h3>
<p>Qty: ${item.quantity}</p>
${item.size ? `<p>Size: ${item.size}</p>` : ""}
</div>
</div>

<div>
<div class="qty-box">
<button onclick="change(${i},-1)">-</button>
<span>${item.quantity}</span>
<button onclick="change(${i},1)">+</button>
</div>
<div class="price">${price.toFixed(2)} JD</div>
</div>
</div>
`;

summaryItems.innerHTML+=`
<div class="summary-item">
<h4>${item.name}</h4>
<p>Quantity: ${item.quantity}</p>
${item.size ? `<p>Size: ${item.size}</p>` : ""}
<p class="item-price">${price.toFixed(2)} JD</p>
</div>
`;
});

document.getElementById("total").innerText=total.toFixed(2)+" JD";

localStorage.setItem("cart", JSON.stringify(cart));
}

function change(i,c){
cart[i].quantity+=c;

if(cart[i].quantity<1){
cart.splice(i,1);
}

render();
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let notes=document.getElementById("notes").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

fetch("http://192.168.1.5:3000/order", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
phone,
notes,
cart,
total:document.getElementById("total").innerText
})
})
.then(res=>res.text())
.then(()=>{
alert("Order sent");
localStorage.removeItem("cart");
location.reload();
})
.catch(()=>{
alert("Server error");
});
}

render();

</script>

</body>
</html>
