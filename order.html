<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{text-align:center;margin-bottom:10px;font-size:38px;}
.subtitle{text-align:center;color:#7a5a45;margin-bottom:30px;}

.back-btn{
margin-bottom:25px;
background:#e3d6cb;
border:none;
padding:11px 22px;
cursor:pointer;
border-radius:8px;
}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.cart-box,.summary-box,.form{
background:white;
padding:22px;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.item{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #eee;
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

.qty-box{
display:flex;
gap:10px;
justify-content:flex-end;
}

.qty-box button{
background:#5c3b2e;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
}

.price{font-weight:bold;}

.form input,.form textarea,.form select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
}

.clear-btn,.checkout-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
}

.clear-btn{background:#ccc;}
.checkout-btn{background:#5c3b2e;color:white;}
</style>
</head>

<body>

<h1>Your Orders</h1>
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="wrapper">

<div>
<div class="cart-box" id="cart"></div>

<div class="form">
<h3>Customer Info</h3>
<input type="text" id="customerName" placeholder="Your Name">
<input type="text" id="customerPhone" placeholder="Phone Number">

<select id="orderType" onchange="render()">
<option value="Pickup">Pickup</option>
<option value="Delivery">Delivery</option>
</select>

<input type="text" id="customerAddress" placeholder="Address">
<textarea id="customerNotes" placeholder="Notes"></textarea>
</div>
</div>

<div class="summary-box">
<h3>Summary</h3>
<div id="subtotal"></div>
<div id="delivery"></div>
<div id="total"></div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>

function goBack(){
window.location.href="menu.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png"
};

function getUnitPrice(item){
if(item.name==="Strawberry Muffins") return 1.5;
return 1;
}

function render(){
let c=document.getElementById("cart");
c.innerHTML="";

if(cart.length===0){
c.innerHTML="Cart empty";
return;
}

let total=0;

cart.forEach((item,i)=>{
let price=getUnitPrice(item)*item.quantity;
total+=price;

c.innerHTML+=`
<div class="item">
<div class="left">
<img src="${images[item.name]}">
<div>
<h3>${item.name}</h3>
<p>${item.quantity}</p>
</div>
</div>

<div>
<div class="qty-box">
<button onclick="changeQty(${i},-1)">-</button>
<span>${item.quantity}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>
<div class="price">${price} JD</div>
</div>
</div>
`;
});

document.getElementById("total").innerText="Total: "+total+" JD";
}

function changeQty(i,c){
cart[i].quantity+=c;
if(cart[i].quantity<1) cart.splice(i,1);
render();
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){
alert("Order sent");
}

render();

</script>

</body>
</html>
