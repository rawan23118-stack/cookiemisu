<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:22px;
}

.back-btn{
display:block;
margin:0 auto 35px;
background:#e3d6cb;
border:none;
padding:12px 26px;
cursor:pointer;
border-radius:30px;
font-weight:600;
color:#5a3a2e;
}

.wrapper{
display:grid;
grid-template-columns:1.1fr 1fr;
gap:30px;
align-items:start;
}

.form,
.summary-box{
background:white;
padding:28px;
border-radius:22px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
}

.form{
display:flex;
flex-direction:column;
}

.form h3,
.summary-box h3{
margin-top:0;
font-size:24px;
}

.form input,
.form textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #d5c7bd;
background:#fffaf7;
font-family:'Playfair Display', serif;
font-size:15px;
outline:none;
}

.form textarea{
height:100px;
resize:none;
}

.form input:focus,
.form textarea:focus{
border-color:#5c3b2e;
}

.summary-item{
display:flex;
gap:14px;
align-items:center;
background:#fffaf7;
border:1px solid #eaded5;
border-radius:16px;
padding:12px;
margin-bottom:14px;
}

.summary-item img{
width:72px;
height:72px;
object-fit:cover;
border-radius:14px;
}

.summary-info{
flex:1;
}

.summary-info h4{
margin:0 0 5px;
font-size:17px;
}

.summary-info p{
margin:3px 0;
font-size:13px;
color:#7a5a45;
}

.summary-price{
font-weight:bold;
font-size:15px;
color:#5a3a2e;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:24px;
font-weight:bold;
border-top:1px solid #ddd;
padding-top:18px;
margin-top:18px;
}

.actions{
display:flex;
gap:12px;
margin-top:24px;
}

.clear-btn,
.checkout-btn{
flex:1;
padding:14px;
border:none;
cursor:pointer;
border-radius:12px;
font-weight:600;
font-family:'Playfair Display', serif;
transition:0.3s;
}

.clear-btn{
background:#e2d6cd;
color:#5a3a2e;
}

.checkout-btn{
background:#5c3b2e;
color:white;
}

.checkout-btn:hover{
background:black;
}

.empty{
text-align:center;
color:#999;
padding:35px 0;
}

@media(max-width:800px){
body{
padding:25px 5%;
}

.wrapper{
grid-template-columns:1fr;
}

h1{
font-size:34px;
}
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review your order before confirming</p>

<button class="back-btn" onclick="goBack()">← Back to Menu</button>

<div class="wrapper">

<div class="form">
<h3>Customer Info</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<div class="summary-box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>
function goBack(){
window.location.href="menu.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png",
"Cookies Box":"img/cookies-box (2).png"
};

function getPrice(item){
if(item.name==="Strawberry Muffins") return 1.5;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Dubai Chocolate") return 1;

if(item.name==="Classic Tiramisu"){
return Number(item.size) || 12;
}

if(item.name==="Cookies Box"){
return Number(item.boxSize) || 9;
}

return item.price || 0;
}

function getSizeLabel(item){
if(item.name !== "Classic Tiramisu") return "";
if(Number(item.size) === 5) return "Small - 5 JD";
if(Number(item.size) === 12) return "Medium - 12 JD";
if(Number(item.size) === 20) return "Large - 20 JD";
return "Medium - 12 JD";
}

function getBoxLabel(item){
if(item.name !== "Cookies Box") return "";
if(Number(item.boxSize) === 5) return "Box of 3 - 5 JD";
if(Number(item.boxSize) === 9) return "Box of 6 - 9 JD";
if(Number(item.boxSize) === 16) return "Box of 12 - 16 JD";
return "Box of 6 - 9 JD";
}

function render(){
let summary=document.getElementById("summaryItems");
summary.innerHTML="";

if(cart.length===0){
summary.innerHTML=`<div class="empty">No items selected</div>`;
document.getElementById("total").innerText="0 JD";
return;
}

let total=0;

cart.forEach((item,i)=>{
let price=getPrice(item)*item.quantity;
total+=price;

summary.innerHTML+=`
<div class="summary-item">
<img src="${images[item.name] || 'img/1.png'}">

<div class="summary-info">
<h4>${item.name}</h4>
<p>Quantity: ${item.quantity}</p>
${item.name==="Classic Tiramisu" ? `<p>${getSizeLabel(item)}</p>` : ""}
${item.name==="Cookies Box" ? `<p>${getBoxLabel(item)}</p>` : ""}
<p class="summary-price">${price.toFixed(2)} JD</p>
</div>
</div>
`;
});

document.getElementById("total").innerText=total.toFixed(2)+" JD";
localStorage.setItem("cart", JSON.stringify(cart));
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();
</script>

</body>
</html>
