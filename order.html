<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order</title>
</head>

<body>

<h2>Your Order</h2>

<div id="cartBox"></div>

<br>

<input id="name" placeholder="Your Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>

<button onclick="sendOrder()">Confirm Order</button>

<script>

// 📦 جلب الكارت
const cart = JSON.parse(localStorage.getItem("cart")) || [];

const box = document.getElementById("cartBox");

// عرض الطلب
cart.forEach(item => {
  box.innerHTML += `
    <p>${item.name} - ${item.size} - ${item.price} JD</p>
  `;
});


// 🚀 إرسال الطلب
function sendOrder(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  fetch("http://localhost:3000/order", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      phone,
      cart
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);
  });

}

</script>

</body>
</html>
