<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:20px;
}

.back-btn{
display:block;
margin:0 auto 35px;
background:#e3d6cb;
border:none;
padding:12px 26px;
cursor:pointer;
border-radius:30px;
font-weight:600;
color:#5a3a2e;
transition:0.3s;
}

.back-btn:hover{
background:#d6c5b8;
transform:translateY(-2px);
}

.wrapper{
display:grid;
grid-template-columns:1.2fr 1fr;
gap:30px;
align-items:start;
}

.box{
background:white;
padding:28px;
border-radius:22px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
}

.summary-item{
display:flex;
gap:12px;
background:#fffaf7;
border:1px solid #eaded5;
border-radius:16px;
padding:12px;
margin-bottom:12px;
align-items:center;
}

.summary-item img{
width:65px;
height:65px;
border-radius:12px;
object-fit:cover;
}

.summary-info{
flex:1;
}

.summary-info h4{
margin:0;
font-size:16px;
}

.summary-info p{
margin:3px 0;
font-size:13px;
color:#7a5a45;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.form input,
.form textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #d5c7bd;
background:#fffaf7;
font-family:'Playfair Display', serif;
outline:none;
}

.form textarea{
height:100px;
resize:none;
}

.btn{
width:100%;
margin-top:20px;
padding:14px;
border:none;
background:#5c3b2e;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:black;
}

@media(max-width:800px){
.wrapper{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review and confirm your order</p>

<button class="back-btn" onclick="smartBack()">← Back to Menu</button>

<div class="wrapper">

<div class="box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>
</div>

<div class="box form">
<h3>Customer Info</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>

<button class="btn" onclick="checkout()">Confirm Order</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png",
"Cookies Box":"img/cookies-box (2).png"
};

function saveForm(){
let data = {
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
notes:document.getElementById("notes").value
};

localStorage.setItem("orderForm", JSON.stringify(data));
}

function loadForm(){
let data = JSON.parse(localStorage.getItem("orderForm"));

if(!data) return;

document.getElementById("name").value = data.name || "";
document.getElementById("phone").value = data.phone || "";
document.getElementById("notes").value = data.notes || "";
}

function smartBack(){
saveForm();
window.location.href = "menu.html";
}

function getPrice(item){
if(item.name==="Dubai Chocolate") return 1;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Strawberry Muffins") return 1.5;

if(item.name==="Classic Tiramisu"){
return Number(item.size) || 12;
}

if(item.name==="Cookies Box"){
return Number(item.boxSize) || 9;
}

return 0;
}

function getSizeLabel(item){
if(item.name !== "Classic Tiramisu") return "";

if(Number(item.size) === 5) return "Small - 5 JD";
if(Number(item.size) === 12) return "Medium - 12 JD";
if(Number(item.size) === 20) return "Large - 20 JD";

return "Medium - 12 JD";
}

function getBoxLabel(item){
if(item.name !== "Cookies Box") return "";

if(Number(item.boxSize) === 5) return "Box of 3 - 5 JD";
if(Number(item.boxSize) === 9) return "Box of 6 - 9 JD";
if(Number(item.boxSize) === 16) return "Box of 12 - 16 JD";

return "Box of 6 - 9 JD";
}

function render(){
let summary=document.getElementById("summaryItems");

if(cart.length===0){
summary.innerHTML=`<p>Cart is empty</p>`;
document.getElementById("total").innerText="0 JD";
return;
}

let total=0;
summary.innerHTML="";

cart.forEach(item=>{

let price=getPrice(item)*item.quantity;
total+=price;

summary.innerHTML+=`
<div class="summary-item">
<img src="${images[item.name] || 'img/1.png'}">
<div class="summary-info">
<h4>${item.name}</h4>
<p>Qty: ${item.quantity}</p>
${item.name==="Classic Tiramisu" ? `<p>${getSizeLabel(item)}</p>` : ""}
${item.name==="Cookies Box" ? `<p>${getBoxLabel(item)}</p>` : ""}
<p><b>${price.toFixed(2)} JD</b></p>
</div>
</div>
`;
});

document.getElementById("total").innerText=total.toFixed(2)+" JD";
}

function checkout(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
localStorage.removeItem("orderForm");
location.reload();
}

loadForm();
render();
</script>

</body>
</html>
