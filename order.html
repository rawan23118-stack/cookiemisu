<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:22px;
}

/* 🔥 SWITCH */
.switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
}

.switch button{
padding:10px 20px;
border:none;
background:#e3d6cb;
cursor:pointer;
border-radius:20px;
font-weight:600;
transition:0.3s;
}

.switch .active{
background:#5c3b2e;
color:white;
}

/* BOX */
.box{
background:white;
padding:28px;
border-radius:22px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
max-width:600px;
margin:0 auto;
}

/* FORM */
.form input,
.form textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #d5c7bd;
background:#fffaf7;
font-family:'Playfair Display', serif;
font-size:15px;
outline:none;
}

.form textarea{
height:100px;
resize:none;
}

/* SUMMARY */
.summary-item{
display:flex;
gap:12px;
background:#fffaf7;
border:1px solid #eaded5;
border-radius:16px;
padding:12px;
margin-bottom:12px;
align-items:center;
}

.summary-item img{
width:65px;
height:65px;
border-radius:12px;
object-fit:cover;
}

.summary-info{
flex:1;
}

.summary-info h4{
margin:0;
font-size:16px;
}

.summary-info p{
margin:3px 0;
font-size:13px;
color:#7a5a45;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

/* BUTTON */
.checkout-btn{
width:100%;
margin-top:20px;
padding:14px;
border:none;
background:#5c3b2e;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.checkout-btn:hover{
background:black;
}

.empty{
text-align:center;
color:#999;
padding:30px;
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review your order before confirming</p>

<div class="switch">
<button id="tabOrder" class="active" onclick="showTab('order')">Order Summary</button>
<button id="tabInfo" onclick="showTab('info')">Customer Info</button>
</div>

<!-- ORDER -->
<div id="orderTab" class="box">
<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>

<button class="checkout-btn" onclick="showTab('info')">
Continue
</button>
</div>

<!-- CUSTOMER -->
<div id="infoTab" class="box" style="display:none;">
<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>

<button class="checkout-btn" onclick="checkout()">
Confirm Order
</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png",
"Cookies Box":"img/cookies-box (2).png"
};

function getPrice(item){
if(item.name==="Dubai Chocolate") return 1;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Strawberry Muffins") return 1.5;

if(item.name==="Classic Tiramisu"){
return Number(item.size) || 12;
}

if(item.name==="Cookies Box"){
return Number(item.boxSize) || 9;
}

return 0;
}

function getBoxLabel(item){
if(item.name!=="Cookies Box") return "";

if(item.boxSize==5) return "Box of 3";
if(item.boxSize==9) return "Box of 6";
if(item.boxSize==16) return "Box of 12";

return "";
}

function render(){

let summary=document.getElementById("summaryItems");

if(cart.length===0){
summary.innerHTML=`<div class="empty">No items selected</div>`;
document.getElementById("total").innerText="0 JD";
return;
}

let total=0;
summary.innerHTML="";

cart.forEach(item=>{

let price=getPrice(item)*item.quantity;
total+=price;

summary.innerHTML+=`
<div class="summary-item">
<img src="${images[item.name]}">

<div class="summary-info">
<h4>${item.name}</h4>
<p>Qty: ${item.quantity}</p>
${item.name==="Cookies Box" ? `<p>${getBoxLabel(item)}</p>` : ""}
<p><b>${price} JD</b></p>
</div>
</div>
`;
});

document.getElementById("total").innerText=total+" JD";
}

function showTab(tab){

document.getElementById("orderTab").style.display = tab==="order"?"block":"none";
document.getElementById("infoTab").style.display = tab==="info"?"block":"none";

document.getElementById("tabOrder").classList.remove("active");
document.getElementById("tabInfo").classList.remove("active");

if(tab==="order"){
document.getElementById("tabOrder").classList.add("active");
}else{
document.getElementById("tabInfo").classList.add("active");
}
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();

</script>

</body>
</html>
