<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:30px;
}

/* 🔥 LAYOUT */
.wrapper{
display:grid;
grid-template-columns:1.2fr 1fr;
gap:30px;
align-items:start;
}

/* BOX */
.box{
background:white;
padding:28px;
border-radius:22px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
}

/* SUMMARY */
.summary-item{
display:flex;
gap:12px;
background:#fffaf7;
border:1px solid #eaded5;
border-radius:16px;
padding:12px;
margin-bottom:12px;
align-items:center;
}

.summary-item img{
width:65px;
height:65px;
border-radius:12px;
object-fit:cover;
}

.summary-info{
flex:1;
}

.summary-info h4{
margin:0;
font-size:16px;
}

.summary-info p{
margin:3px 0;
font-size:13px;
color:#7a5a45;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:20px;
}

/* FORM */
.form input,
.form textarea{
width:100%;
padding:14px;
margin:10px 0;
border-radius:12px;
border:1px solid #d5c7bd;
background:#fffaf7;
font-family:'Playfair Display', serif;
outline:none;
}

.form textarea{
height:100px;
resize:none;
}

/* BUTTON */
.btn{
width:100%;
margin-top:20px;
padding:14px;
border:none;
background:#5c3b2e;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:black;
}

/* MOBILE */
@media(max-width:800px){
.wrapper{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review and confirm your order</p>

<div class="wrapper">

<!-- 🔥 LEFT: ORDER -->
<div class="box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>
</div>

<!-- 🔥 RIGHT: FORM -->
<div class="box form">
<h3>Customer Info</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>

<button class="btn" onclick="checkout()">Confirm Order</button>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png",
"Cookies Box":"img/cookies-box (2).png"
};

function getPrice(item){
if(item.name==="Dubai Chocolate") return 1;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Strawberry Muffins") return 1.5;

if(item.name==="Classic Tiramisu"){
return Number(item.size) || 12;
}

if(item.name==="Cookies Box"){
return Number(item.boxSize) || 9;
}

return 0;
}

function render(){

let summary=document.getElementById("summaryItems");

if(cart.length===0){
summary.innerHTML=`<p>Cart is empty</p>`;
return;
}

let total=0;
summary.innerHTML="";

cart.forEach(item=>{

let price=getPrice(item)*item.quantity;
total+=price;

summary.innerHTML+=`
<div class="summary-item">
<img src="${images[item.name]}">
<div class="summary-info">
<h4>${item.name}</h4>
<p>Qty: ${item.quantity}</p>
<p><b>${price} JD</b></p>
</div>
</div>
`;
});

document.getElementById("total").innerText=total+" JD";
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();

</script>

</body>
</html>
