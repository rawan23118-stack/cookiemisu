<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:22px;
}

.back-btn{
display:block;
margin:0 auto 35px;
background:#e3d6cb;
border:none;
padding:12px 26px;
cursor:pointer;
border-radius:30px;
font-weight:600;
}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

.cart-box,.summary-box,.form{
background:white;
padding:24px;
border-radius:20px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
}

.item{
display:flex;
justify-content:space-between;
padding:16px 0;
border-bottom:1px solid #eee;
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:80px;
height:80px;
border-radius:14px;
object-fit:cover;
}

.qty-box{
display:flex;
gap:10px;
}

.qty-box button{
background:#5c3b2e;
color:white;
border:none;
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
}

.price{
font-weight:bold;
}

.summary-item{
background:#fffaf7;
border:1px solid #eaded5;
border-radius:14px;
padding:13px;
margin-bottom:12px;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:15px;
}

.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.clear-btn,.checkout-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
border-radius:10px;
}

.clear-btn{background:#ddd;}
.checkout-btn{background:#5c3b2e;color:white;}

.empty{
text-align:center;
color:#999;
padding:40px 0;
}
</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review your items before confirming</p>

<button class="back-btn" onclick="goBack()">← Back to Menu</button>

<div class="wrapper">

<div>
<div class="cart-box" id="cart"></div>

<div class="form">
<h3>Customer Info</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="summary-box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>

function goBack(){
window.location.href="menu.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const images = {
"Tiramisu Cookie":"img/1.png",
"Dubai Chocolate":"img/6.png",
"Classic Tiramisu":"img/2.png",
"Blueberry Cookie":"img/3.png",
"Cinnamon Roll":"img/5.png",
"Tiramisu Balls":"img/4.png",
"Classic Cookie":"img/7.png",
"Strawberry Muffins":"img/a2fd2949-104e-46fc-bf96-1d8d1bf77108.png"
};

/* 🔥 السعر */
function getPrice(item){
if(item.name==="Strawberry Muffins") return 1.5;
if(item.name==="Tiramisu Balls") return 3;
if(item.name==="Classic Cookie") return 1;
if(item.name==="Blueberry Cookie") return 1.5;
if(item.name==="Cinnamon Roll") return 1.5;
if(item.name==="Tiramisu Cookie") return 2;
if(item.name==="Dubai Chocolate") return 15;

if(item.name==="Classic Tiramisu"){
return Number(item.size) || 12;
}

return 0;
}

/* 🔥 اسم الحجم */
function getSizeLabel(item){
if(item.name !== "Classic Tiramisu") return "";

if(Number(item.size) === 5) return "Small - 5 JD";
if(Number(item.size) === 12) return "Medium - 12 JD";
if(Number(item.size) === 20) return "Large - 20 JD";

return "Medium - 12 JD";
}

function render(){

let container=document.getElementById("cart");
let summary=document.getElementById("summaryItems");

container.innerHTML="";
summary.innerHTML="";

if(cart.length===0){
container.innerHTML=`<div class="empty">Cart is empty</div>`;
summary.innerHTML=`<div class="empty">No items</div>`;
document.getElementById("total").innerText="0 JD";
return;
}

let total=0;

cart.forEach((item,i)=>{

let price=getPrice(item)*item.quantity;
total+=price;

container.innerHTML+=`
<div class="item">
<div class="left">
<img src="${images[item.name]}">
<div>
<h3>${item.name}</h3>
<p>Qty: ${item.quantity}</p>
${item.name==="Classic Tiramisu" ? `<p>Size: ${getSizeLabel(item)}</p>` : ""}
</div>
</div>

<div>
<div class="qty-box">
<button onclick="changeQty(${i},-1)">-</button>
<span>${item.quantity}</span>
<button onclick="changeQty(${i},1)">+</button>
</div>
<div class="price">${price.toFixed(2)} JD</div>
</div>
</div>
`;

summary.innerHTML+=`
<div class="summary-item">
<h4>${item.name}</h4>
<p>Qty: ${item.quantity}</p>
${item.name==="Classic Tiramisu" ? `<p>Size: ${getSizeLabel(item)}</p>` : ""}
<p><b>${price.toFixed(2)} JD</b></p>
</div>
`;
});

document.getElementById("total").innerText=total.toFixed(2)+" JD";
localStorage.setItem("cart", JSON.stringify(cart));
}

function changeQty(i,c){
cart[i].quantity+=c;
if(cart[i].quantity<1){
cart.splice(i,1);
}
render();
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();

</script>

</body>
</html>
