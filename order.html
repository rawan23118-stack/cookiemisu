<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders - Cookiemisu</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Playfair Display', serif;
background:#f6f1ec;
color:#5a3a2e;
padding:40px 8%;
}

h1{
text-align:center;
font-size:42px;
}

.subtitle{
text-align:center;
color:#7a5a45;
margin-bottom:22px;
}

.back-btn{
display:block;
margin:0 auto 35px;
background:#e3d6cb;
border:none;
padding:12px 26px;
cursor:pointer;
border-radius:30px;
font-weight:600;
}

.wrapper{
display:grid;
grid-template-columns:2fr 1fr;
gap:30px;
}

/* BOXES */
.cart-box,.summary-box,.form{
background:white;
padding:24px;
border-radius:20px;
box-shadow:0 14px 35px rgba(0,0,0,0.08);
}

/* ITEMS */
.item{
display:flex;
justify-content:space-between;
padding:16px 0;
border-bottom:1px solid #eee;
}

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:80px;
height:80px;
border-radius:14px;
object-fit:cover;
}

/* QTY */
.qty-box{
display:flex;
gap:10px;
}

.qty-box button{
background:#5c3b2e;
color:white;
border:none;
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
}

/* PRICE */
.price{
font-weight:bold;
}

/* SUMMARY */
.summary-item{
background:#fffaf7;
border:1px solid #eaded5;
border-radius:14px;
padding:13px;
margin-bottom:12px;
}

.summary-total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:15px;
}

/* ACTIONS */
.actions{
display:flex;
gap:10px;
margin-top:20px;
}

.clear-btn,.checkout-btn{
flex:1;
padding:12px;
border:none;
cursor:pointer;
border-radius:10px;
}

.clear-btn{background:#ddd;}
.checkout-btn{background:#5c3b2e;color:white;}

/* 🔥 FORM FIX */
.form{
margin-top:25px;
display:flex;
flex-direction:column;
}

.form h3{
margin-bottom:10px;
}

.form input,
.form textarea{
width:100%;
padding:13px;
margin:10px 0;
border-radius:10px;
border:1px solid #d5c7bd;
background:#fffaf7;
font-family:'Playfair Display', serif;
font-size:15px;
outline:none;
}

.form textarea{
height:90px;
resize:none;
}

.form input:focus,
.form textarea:focus{
border-color:#5c3b2e;
}

/* EMPTY */
.empty{
text-align:center;
color:#999;
padding:40px 0;
}

</style>
</head>

<body>

<h1>Your Orders</h1>
<p class="subtitle">Review your items before confirming</p>

<button class="back-btn" onclick="goBack()">← Back to Menu</button>

<div class="wrapper">

<div>
<div class="cart-box" id="cart"></div>

<div class="form">
<h3>Customer Info</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="notes" placeholder="Notes"></textarea>
</div>
</div>

<div class="summary-box">
<h3>Order Summary</h3>

<div id="summaryItems"></div>

<div class="summary-total">
<span>Total</span>
<span id="total">0 JD</span>
</div>

<div class="actions">
<button class="clear-btn" onclick="clearCart()">Clear</button>
<button class="checkout-btn" onclick="checkout()">Confirm</button>
</div>
</div>

</div>

<script>

function goBack(){
window.location.href="menu.html";
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){
let container=document.getElementById("cart");

if(cart.length===0){
container.innerHTML=`<div class="empty">Cart is empty</div>`;
return;
}

container.innerHTML="";
cart.forEach((item,i)=>{
container.innerHTML+=`
<div class="item">
<div class="left">
<div>
<h3>${item.name}</h3>
<p>Qty: ${item.quantity}</p>
</div>
</div>
</div>
`;
});
}

function clearCart(){
localStorage.removeItem("cart");
cart=[];
render();
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(!name || !phone){
alert("Fill your info");
return;
}

if(cart.length===0){
alert("Cart empty");
return;
}

alert("Order sent");
localStorage.removeItem("cart");
location.reload();
}

render();

</script>

</body>
</html>
