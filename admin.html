<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Orders</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f6f1ec;
}

h1{
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th, td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#5c3b2e;
color:white;
}

button{
padding:6px 10px;
border:none;
background:#5c3b2e;
color:white;
cursor:pointer;
border-radius:5px;
}

.done{
background:green;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.logout{
background:red;
}
</style>

</head>

<body>

<div class="top-bar">
<h1>Orders Dashboard</h1>
<button class="logout" onclick="logout()">Logout</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>

<script>

const BASE_URL = "http://localhost:3000";

// تحميل الطلبات
function loadOrders(){

const table = document.getElementById("ordersTable");

// loading
table.innerHTML = "<tr><td colspan='8'>Loading...</td></tr>";

fetch(`${BASE_URL}/orders`)
.then(res => {
  if(!res.ok) throw new Error("Server error");
  return res.json();
})
.then(data => {

  table.innerHTML = "";

  // اذا ما في بيانات
  if(!data || data.length === 0){
    table.innerHTML = "<tr><td colspan='8'>No orders found</td></tr>";
    return;
  }

  data.forEach(order => {

    table.innerHTML += `
    <tr>
    <td>${order.name}</td>
    <td>${order.phone}</td>
    <td>${order.product}</td>
    <td>${order.size}</td>
    <td>${order.quantity}</td>
    <td>${order.price} JD</td>
    <td>${order.status}</td>
    <td>
    ${
      order.status === 'done'
      ? '<button class="done">Done</button>'
      : `<button onclick="markDone(${order.id})">Mark as Done</button>`
    }
    </td>
    </tr>
    `;
  });

})
.catch(err => {
  console.error(err);
  table.innerHTML = "<tr><td colspan='8'>Error loading orders</td></tr>";
});

}

// تغيير الحالة
function markDone(id){

fetch(`${BASE_URL}/order/${id}`, {
method: "PUT"
})
.then(res => {
  if(!res.ok) throw new Error("Update failed");
  return res.text();
})
.then(() => {
  loadOrders(); // refresh
})
.catch(err => {
  console.error(err);
  alert("Update failed");
});

}

// logout
function logout(){
window.location.href = "login.html";
}

// تشغيل الصفحة
loadOrders();

</script>

</body>
</html>
